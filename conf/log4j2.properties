# Reduce Spark's log output so notebook cells show clean results
rootLogger.level = WARN
rootLogger.appenderRef.console.ref = console

appender.console.type = Console
appender.console.name = console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss} %-5p %c{1} - %m%n

# Silence noisy Spark internals
logger.repl.name = org.apache.spark.repl.Main
logger.repl.level = WARN
logger.thriftserver.name = org.apache.spark.sql.hive.thriftserver
logger.thriftserver.level = WARN
logger.parquet.name = org.apache.parquet
logger.parquet.level = ERROR
logger.hadoop.name = org.apache.hadoop
logger.hadoop.level = ERROR
