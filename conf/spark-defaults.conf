# ── Delta Lake ─────────────────────────────────────────────────────────────────
spark.jars                         /opt/spark/jars/delta-spark_2.12-3.2.0.jar,/opt/spark/jars/delta-storage-3.2.0.jar
spark.sql.extensions               io.delta.sql.DeltaSparkSessionExtension
spark.sql.catalog.spark_catalog    org.apache.spark.sql.delta.catalog.DeltaCatalog

# ── Event log (powers History Server / Spark UI history) ──────────────────────
spark.eventLog.enabled             true
spark.eventLog.dir                 /tmp/spark-events

# ── Adaptive Query Execution ───────────────────────────────────────────────────
spark.sql.adaptive.enabled                      true
spark.sql.adaptive.coalescePartitions.enabled   true
spark.sql.adaptive.skewJoin.enabled             true

# ── Python version alignment (driver=3.11, executors must match) ───────────────
spark.executorEnv.PYSPARK_PYTHON   /usr/local/bin/python3

# ── Serialization ──────────────────────────────────────────────────────────────
spark.serializer                   org.apache.spark.serializer.KryoSerializer

# ── Shuffle ────────────────────────────────────────────────────────────────────
spark.sql.shuffle.partitions       20

# ── UI ─────────────────────────────────────────────────────────────────────────
spark.ui.enabled                   true
spark.ui.port                      4040
# Each instance publishes exactly two app UI ports (4040, 4041). maxRetries=1 lets
# a second concurrent app fall back to 4041 but stops a third from grabbing 4042.
spark.port.maxRetries              1
