version: "3.8"

# Official Apache Spark image (Bitnami's public images were removed from Docker Hub).
# Unlike Bitnami, this image has no SPARK_MODE/SPARK_* convention — master and worker
# are launched explicitly via spark-class, and paths live under /opt/spark.
x-spark-common: &spark-common
  build:
    context: ./docker/spark
    dockerfile: Dockerfile
    args:
      # Per-user base image tag so the FROM chain stays within this instance.
      BASE_IMAGE: ${BASE_IMAGE:-despark-base:3.5.3}
  image: ${SPARK_IMAGE:-despark-spark:3.5.3}   # custom image: apache/spark:3.5.3 + Python 3.11
  # Run master/workers as the host user (set per-instance by scripts/provision.sh).
  # Executors run the file-writing tasks, so they must own the writes on the
  # bind-mounted data dir; matching the host UID keeps output files owned by the
  # user and avoids "cannot create directory" on native Linux bind mounts.
  # Defaults to 1000:1000 for the single-instance .env path / Docker Desktop.
  user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
  environment:
    # An arbitrary UID has no /etc/passwd entry, so HOME is undefined — point it at
    # a writable dir so Spark's launch scripts never try to write to /.
    - HOME=/tmp
  volumes:
    - ./conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    - ./conf/log4j2.properties:/opt/spark/conf/log4j2.properties
    # Delta Lake JARs (vendored alongside the Jupyter image) so cluster-side
    # drivers/executors and `make submit` are Delta-capable too.
    - ./docker/jupyter/jars/delta-spark_2.12-3.2.0.jar:/opt/spark/jars/delta-spark_2.12-3.2.0.jar:ro
    - ./docker/jupyter/jars/delta-storage-3.2.0.jar:/opt/spark/jars/delta-storage-3.2.0.jar:ro
    # Per-user workspace. WORKSPACE defaults to the repo root (single-user mode);
    # the provisioner sets it to instances/<user> for an isolated instance.
    - ${WORKSPACE:-.}/data:/opt/spark-data
    # Also expose the data dir at the SAME path the Jupyter driver uses. Notebooks
    # write absolute paths like /home/jovyan/data/x.csv; with a standalone cluster
    # the executors (here, on the workers) run the write, so they must resolve that
    # exact path. Mounting the same host dir at both locations gives driver and
    # executors a shared filesystem view, so the FileOutputCommitter rename works.
    - ${WORKSPACE:-.}/data:/home/jovyan/data
    - ${WORKSPACE:-.}/apps:/opt/spark-apps
  networks:
    - spark-net

services:
  spark-master:
    <<: *spark-common
    container_name: ${INSTANCE:-despark}-spark-master
    hostname: spark-master
    command: >
      bash -c "mkdir -p /tmp/spark-events &&
      exec /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host spark-master --port 7077 --webui-port 8080"
    ports:
      - "${SPARK_MASTER_WEBUI_PORT:-8080}:8080"
      - "${SPARK_MASTER_PORT:-7077}:7077"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 5

  spark-worker-1:
    <<: *spark-common
    container_name: ${INSTANCE:-despark}-spark-worker-1
    hostname: spark-worker-1
    command: >
      bash -c "mkdir -p /tmp/spark-events &&
      exec /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      --webui-port 8081
      --cores ${SPARK_WORKER_CORES:-2}
      --memory ${SPARK_WORKER_MEMORY:-2G}
      spark://spark-master:7077"
    ports:
      - "${SPARK_WORKER1_WEBUI_PORT:-8081}:8081"
    depends_on:
      spark-master:
        condition: service_healthy

  spark-worker-2:
    <<: *spark-common
    container_name: ${INSTANCE:-despark}-spark-worker-2
    hostname: spark-worker-2
    command: >
      bash -c "mkdir -p /tmp/spark-events &&
      exec /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      --webui-port 8082
      --cores ${SPARK_WORKER_CORES:-2}
      --memory ${SPARK_WORKER_MEMORY:-2G}
      spark://spark-master:7077"
    ports:
      - "${SPARK_WORKER2_WEBUI_PORT:-8082}:8082"
    depends_on:
      spark-master:
        condition: service_healthy

  jupyter:
    build:
      context: ./docker/jupyter
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE:-despark-base:3.5.3}
    image: ${JUPYTER_IMAGE:-despark-jupyter}
    container_name: ${INSTANCE:-despark}-jupyter
    hostname: jupyter
    # Same host UID/GID as the Spark cluster: driver and executors then share one
    # identity, so files staged by executors and committed by the driver line up
    # on the shared data mount. /home/jovyan is made world-writable in the image
    # (see docker/jupyter/Dockerfile) so an arbitrary UID can use it as HOME.
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
      # Exactly two Spark application UIs are published per instance.
      - "${SPARK_APP1_UI_PORT:-4040}:4040"
      - "${SPARK_APP2_UI_PORT:-4041}:4041"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=spark-learn
      # HOME is undefined for an arbitrary UID with no passwd entry; pin it so
      # JupyterLab writes its runtime/config under the (world-writable) home.
      - HOME=/home/jovyan
    volumes:
      - ${WORKSPACE:-.}/notebooks:/home/jovyan/notebooks
      - ${WORKSPACE:-.}/data:/home/jovyan/data
      - ${WORKSPACE:-.}/apps:/home/jovyan/apps
      - ./conf:/home/jovyan/conf
    networks:
      - spark-net
    depends_on:
      spark-master:
        condition: service_healthy

networks:
  spark-net:
    name: ${NETWORK_NAME:-despark-spark-net}
    driver: bridge
    ipam:
      config:
        - subnet: ${SUBNET:-172.28.0.0/24}
